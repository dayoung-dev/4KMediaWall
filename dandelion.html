<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dandelion Glitch - Interactive Media Art (4K Optimized)</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet">

    <!-- Three.js 및 Post-processing 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FilmShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/FilmPass.js"></script>

    <!-- GSAP for UI Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #87CEEB; /* Sky Blue Base */
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            transition: cursor 0.3s;
            color: #333;
        }

        body.hide-cursor { cursor: none; }

        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center; z-index: 25;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
        }

        .message { font-size: 1.1rem; font-weight: 300; letter-spacing: 0.15em; text-align: center; color: #555; text-transform: uppercase; }

        #helper-text {
            position: absolute; bottom: 30px; right: 40px; font-size: 0.8rem;
            color: rgba(50, 50, 50, 0.6); z-index: 15; letter-spacing: 0.2em;
            pointer-events: none; opacity: 0; transition: opacity 0.5s; text-transform: uppercase;
        }

        #audio-helper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.9rem; font-weight: 400; color: #333;
            z-index: 20; letter-spacing: 0.3em; pointer-events: none; text-transform: uppercase;
            animation: breatheUI 3s infinite ease-in-out;
            background: rgba(255, 255, 255, 0.4); padding: 20px 45px;
            border: 1px solid rgba(0, 0, 0, 0.1); backdrop-filter: blur(8px);
            border-radius: 8px;
        }

        @keyframes breatheUI {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.98); box-shadow: 0 0 0px rgba(255,255,255,0); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.98); box-shadow: 0 0 0px rgba(255,255,255,0); }
        }

        #settings-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30;
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #settings-layer.active { opacity: 1; pointer-events: auto; }
        .settings-box {
            background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 40px 50px; border-radius: 12px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .settings-title { font-size: 1.5rem; letter-spacing: 0.2em; margin-bottom: 30px; color: #111; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; width: 320px; margin-bottom: 20px; }
        .setting-label { font-size: 1rem; letter-spacing: 0.1em; color: #333; width: 120px; text-align: left; }
        .toggle-btn {
            background: transparent; border: 1px solid #333; color: #333;
            padding: 8px 24px; font-family: 'Cinzel', serif; cursor: pointer; transition: 0.3s;
            letter-spacing: 0.1em; font-size: 1rem; border-radius: 4px; width: 150px;
        }
        .toggle-btn:hover { background: #333; color: #fff; }

        .setting-slider {
            width: 150px; -webkit-appearance: none; background: transparent; outline: none;
        }
        .setting-slider::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #333; cursor: pointer; margin-top: -6px;
        }
        .setting-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 2px;
        }

        #sample-canvas, #webcam-video, #silhouette-canvas { display: none; }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <video id="webcam-video" autoplay playsinline muted></video>
    <canvas id="sample-canvas"></canvas>
    <canvas id="silhouette-canvas"></canvas>
    
    <div id="ui-layer">
        <p class="message" id="error-msg">카메라를 켤 수 없습니다. 요정의 바람으로 대체합니다.</p>
    </div>

    <!-- 설정 패널 UI -->
    <div id="settings-layer">
        <div class="settings-box">
            <div class="settings-title">WIND & SEEDS</div>
            <div class="setting-row">
                <span class="setting-label">AUDIO</span>
                <button id="sound-toggle-btn" class="toggle-btn">ON</button>
            </div>
            <div class="setting-row">
                <span class="setting-label">WEBCAM</span>
                <button id="webcam-toggle-btn" class="toggle-btn">ON</button>
            </div>
            <div class="setting-row">
                <span class="setting-label">VIRTUAL WIND</span>
                <button id="virtual-wind-btn" class="toggle-btn">OFF</button>
            </div>
            <div class="setting-row">
                <span class="setting-label">V. WIND SIZE</span>
                <input type="range" id="mock-size-slider" class="setting-slider" min="5" max="50" step="1" value="10">
            </div>
            <div class="setting-row">
                <span class="setting-label">V. WIND SPEED</span>
                <input type="range" id="mock-speed-slider" class="setting-slider" min="0.01" max="0.15" step="0.01" value="0.01">
            </div>
            <div class="setting-row">
                <span class="setting-label">V. WIND PATH</span>
                <input type="range" id="mock-path-slider" class="setting-slider" min="10" max="60" step="1" value="60">
            </div>
            <div class="setting-row">
                <span class="setting-label">WIND FORCE</span>
                <input type="range" id="wind-slider" class="setting-slider" min="0.5" max="5.0" step="0.1" value="2.5">
            </div>
            <div class="setting-row">
                <span class="setting-label">BLOOM</span>
                <input type="range" id="bloom-slider" class="setting-slider" min="0.1" max="2.0" step="0.1" value="0.3">
            </div>
        </div>
    </div>

    <div id="helper-text">[ESC] Configure</div>
    <div id="audio-helper">Breathe the Wind<br><span style="font-size: 0.6em; opacity: 0.7;">or Swipe the screen</span></div>

<script>
    const CONFIG = {
        MAX_BGM_PARTICLES: 100,      // 4K 해상도를 채우기 위해 40에서 100으로 증가
        NUM_HEADS: Math.floor(Math.random() * 7) + 7, // 7~13 송이 사이 랜덤
        SEEDS_PER_HEAD: 60,          // 한 송이당 씨앗 수 50에서 60으로 증가
        SAMPLE_WIDTH: 128,         
        SAMPLE_HEIGHT: 128,
        MOTION_THRESHOLD: 25,
        WIND_FORCE: 2.5,
        BASE_BLOOM: 0.3, 
        WORLD_WIDTH: 400,            // 4K 넓은 화면 대응 300에서 400으로 확장
        WORLD_HEIGHT: 200,           // 150에서 200으로 확장
        WORLD_DEPTH: 100             // 80에서 100으로 확장
    };

    let scene, camera, renderer, composer, bloomPass;
    let bgParticles, bgPositions, bgLife, bgSizes, bgVelocities;
    let particleGeometry, particleMaterial, particleSystem;
    let skyPlane, skyMat, silhouettePlane, silhouetteMat;
    let silhouetteTex;
    
    let heads = [];
    let seedData = [];

    const video = document.getElementById('webcam-video');
    const sampleCanvas = document.getElementById('sample-canvas');
    const silhouetteCanvas = document.getElementById('silhouette-canvas');
    const ctx = sampleCanvas.getContext('2d', { willReadFrequently: true });
    const silCtx = silhouetteCanvas.getContext('2d', { willReadFrequently: true });
    
    let previousImageData = null;
    let bgData = null; 
    let globalMotion = { x: 0, y: 0, vx: 0, vy: 0, intensity: 0 };
    let isMockMode = false, mockAngle = 0, isUIHidden = true; 
    let currentStream = null;
    let showVirtualWind = false;
    
    // 가상의 바람 제어 변수
    let mockWindSize = 10;
    let mockWindSpeed = 0.01;
    let mockWindPath = 60;

    const AudioEngine = {
        ctx: null, masterGain: null, windGain: null, windFilter: null, eqFilter: null, chimeGain: null,
        isInitialized: false, isMuted: false, lastChimeTime: 0,
        scale: [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50], 

        toggleMute: function() {
            this.isMuted = !this.isMuted;
            if (this.isInitialized && this.masterGain) {
                this.masterGain.gain.setTargetAtTime(this.isMuted ? 0.0 : 0.4, this.ctx.currentTime, 0.05);
            }
            return this.isMuted;
        },

        init: function() {
            if (this.isInitialized) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = this.isMuted ? 0.0 : 0.4;
            this.masterGain.connect(this.ctx.destination);
            this.startWind();
            this.chimeGain = this.ctx.createGain();
            this.chimeGain.gain.value = 0.3;
            this.chimeGain.connect(this.masterGain);
            this.isInitialized = true;
        },
        
        startWind: function() {
            const bufferSize = this.ctx.sampleRate * 2;
            const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource(); noise.buffer = noiseBuffer; noise.loop = true;
            this.windFilter = this.ctx.createBiquadFilter(); 
            this.windFilter.type = 'bandpass'; this.windFilter.frequency.value = 500; this.windFilter.Q.value = 0.8;
            
            // 200-400Hz 대역을 눌러주는 EQ 추가
            this.eqFilter = this.ctx.createBiquadFilter();
            this.eqFilter.type = 'peaking';
            this.eqFilter.frequency.value = 300; // 중심 주파수 300Hz
            this.eqFilter.Q.value = 1.0;
            this.eqFilter.gain.value = -8; // 해당 대역 게인(볼륨) 8dB 감소

            this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0.05; 
            noise.connect(this.windFilter); 
            this.windFilter.connect(this.eqFilter);
            this.eqFilter.connect(this.windGain); 
            this.windGain.connect(this.masterGain);
            noise.start();
        },

        updateMotion: function(motionIntensity, windSpeed) {
            if (!this.isInitialized) return;
            // LFO 느낌의 게인 및 주파수 변동폭 축소 (기본값 낮춤)
            let targetGain = 0.05 + Math.min(windSpeed * 0.03 + motionIntensity * 0.15, 0.3);
            let targetFreq = 500 + Math.min(windSpeed * 30 + motionIntensity * 500, 1000);
            this.windGain.gain.setTargetAtTime(targetGain, this.ctx.currentTime, 0.3);
            this.windFilter.frequency.setTargetAtTime(targetFreq, this.ctx.currentTime, 0.3);
            if (windSpeed > 3.0 && this.ctx.currentTime - this.lastChimeTime > 0.6) {
                this.playChime(Math.min(windSpeed * 0.1, 1.0));
                this.lastChimeTime = this.ctx.currentTime;
            }
        },
        
        playChime: function(intensity) {
            const pitch = this.scale[Math.floor(Math.random() * this.scale.length)];
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = pitch;
            const now = this.ctx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.0);
            osc.connect(gain); gain.connect(this.chimeGain);
            osc.start(now); osc.stop(now + 2.1);
        }
    };

    window.addEventListener('load', startExperience);
    document.addEventListener('keydown', handleKeyDown);

    document.addEventListener('click', (e) => {
        if (e.target.closest('#settings-layer')) return; 
        if (!AudioEngine.isInitialized) {
            AudioEngine.init();
            gsap.to('#audio-helper', { opacity: 0, duration: 1.5, onComplete: () => {
                document.getElementById('audio-helper').style.display = 'none';
            } });
        }
    });

    // 마우스 및 터치(스와이프)로 바람 생성 로직 추가
    let isDragging = false;
    let lastPointerPos = { x: 0, y: 0 };

    document.addEventListener('pointerdown', (e) => {
        if (e.target.closest('#settings-layer')) return;
        isDragging = true;
        lastPointerPos = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        let dx = e.clientX - lastPointerPos.x;
        let dy = e.clientY - lastPointerPos.y;
        
        // 화면 스와이프 방향에 맞춰 바람의 물리적 힘(velocity) 증가
        globalMotion.vx += dx * 0.08 * CONFIG.WIND_FORCE;
        globalMotion.vy -= dy * 0.08 * CONFIG.WIND_FORCE; // Three.js는 Y축이 위로 갈수록 +이므로 반전
        
        globalMotion.intensity = Math.min(globalMotion.intensity + 0.15, 1.0);
        lastPointerPos = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('pointerup', () => { isDragging = false; });
    document.addEventListener('pointercancel', () => { isDragging = false; });

    document.getElementById('sound-toggle-btn').addEventListener('click', (e) => {
        const isMuted = AudioEngine.toggleMute();
        e.target.innerText = isMuted ? 'OFF' : 'ON';
    });

    document.getElementById('webcam-toggle-btn').addEventListener('click', (e) => {
        if (!isMockMode) {
            // Turn OFF webcam
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            video.srcObject = null;
            isMockMode = true;
            e.target.innerText = 'OFF';
        } else {
            // Turn ON webcam
            e.target.innerText = '...'; 
            initWebcam().then(() => {
                isMockMode = false;
                e.target.innerText = 'ON';
            }).catch(() => {
                isMockMode = true;
                e.target.innerText = 'OFF';
                // 실패 시 에러 메시지 잠시 표시
                const errorMsg = document.getElementById('ui-layer');
                errorMsg.style.display = 'flex';
                errorMsg.style.opacity = '1';
                gsap.to('#ui-layer', {opacity: 0, duration: 2, delay: 1, onComplete: () => { errorMsg.style.display = 'none'; }});
            });
        }
    });

    document.getElementById('virtual-wind-btn').addEventListener('click', (e) => {
        showVirtualWind = !showVirtualWind;
        e.target.innerText = showVirtualWind ? 'ON' : 'OFF';
    });

    document.getElementById('mock-size-slider').addEventListener('input', (e) => {
        mockWindSize = parseFloat(e.target.value);
    });

    document.getElementById('mock-speed-slider').addEventListener('input', (e) => {
        mockWindSpeed = parseFloat(e.target.value);
    });

    document.getElementById('mock-path-slider').addEventListener('input', (e) => {
        mockWindPath = parseFloat(e.target.value);
    });

    document.getElementById('wind-slider').addEventListener('input', (e) => {
        CONFIG.WIND_FORCE = parseFloat(e.target.value);
    });

    document.getElementById('bloom-slider').addEventListener('input', (e) => {
        CONFIG.BASE_BLOOM = parseFloat(e.target.value);
        if (bloomPass) bloomPass.strength = CONFIG.BASE_BLOOM;
    });

    function startExperience() {
        silhouetteCanvas.width = CONFIG.SAMPLE_WIDTH;
        silhouetteCanvas.height = CONFIG.SAMPLE_HEIGHT;
        silCtx.fillStyle = '#000000';
        silCtx.fillRect(0, 0, CONFIG.SAMPLE_WIDTH, CONFIG.SAMPLE_HEIGHT);

        initWebcam().then(() => {
            document.getElementById('webcam-toggle-btn').innerText = 'ON';
            enterExhibitionMode();
            initThree();
            animate();
        }).catch((err) => {
            isMockMode = true;
            document.getElementById('webcam-toggle-btn').innerText = 'OFF';
            document.getElementById('ui-layer').style.display = 'flex';
            setTimeout(() => {
                gsap.to('#ui-layer', {opacity: 0, duration: 1.5, onComplete: () => {
                    document.getElementById('ui-layer').style.display = 'none';
                }});
                enterExhibitionMode();
                initThree();
                animate();
            }, 3000);
        });
    }

    function enterExhibitionMode() {
        document.body.classList.add('hide-cursor');
        gsap.to('#helper-text', { opacity: 0, duration: 1 }); 
        isUIHidden = true;
        document.getElementById('settings-layer').classList.remove('active');
    }

    function toggleSettings() {
        isUIHidden = !isUIHidden;
        const settingsLayer = document.getElementById('settings-layer');
        if (isUIHidden) {
            document.body.classList.add('hide-cursor');
            gsap.to('#helper-text', { opacity: 0, duration: 0.5 });
            settingsLayer.classList.remove('active');
        } else {
            document.body.classList.remove('hide-cursor');
            gsap.to('#helper-text', { opacity: 1, duration: 0.5 });
            settingsLayer.classList.add('active');
        }
    }

    function handleKeyDown(e) {
        if (e.key === 'Escape') toggleSettings();
    }

    function initWebcam() {
        return new Promise((resolve, reject) => {
            sampleCanvas.width = CONFIG.SAMPLE_WIDTH; sampleCanvas.height = CONFIG.SAMPLE_HEIGHT;
            navigator.mediaDevices.getUserMedia({ 
                video: { width: CONFIG.SAMPLE_WIDTH, height: CONFIG.SAMPLE_HEIGHT, facingMode: "user" } 
            }).then((stream) => {
                currentStream = stream; // 스트림을 저장해두어 나중에 끌 수 있도록 함
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); resolve(); };
            }).catch(reject);
        });
    }

    function createSingleSeed() {
        const seedGroup = new THREE.Group();
        const coreGeo = new THREE.SphereGeometry(0.12, 8, 8);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x3d2b1f, transparent: true }); 
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.scale.set(1, 2.5, 1); core.position.y = -1.0;
        seedGroup.add(core);

        const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 2.0, 4);
        const stemMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.position.y = 0.0;
        seedGroup.add(stem);

        const fluffGeo = new THREE.BufferGeometry();
        const fluffPos = [];
        const numHairs = 80; 
        for(let j=0; j<numHairs; j++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * (Math.PI / 2.5);
            const len = 2.0 + Math.random() * 1.5;
            fluffPos.push(0, 1.0, 0); 
            fluffPos.push(Math.sin(phi) * Math.cos(theta) * len, 1.0 + Math.cos(phi) * len, Math.sin(phi) * Math.sin(theta) * len);
        }
        fluffGeo.setAttribute('position', new THREE.Float32BufferAttribute(fluffPos, 3));
        const fluffMat = new THREE.LineBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false });
        const fluff = new THREE.LineSegments(fluffGeo, fluffMat);
        seedGroup.add(fluff);

        seedGroup.scale.set(1.2, 1.2, 1.2);
        return seedGroup;
    }

    function initThree() {
        const canvas = document.getElementById('webgl-canvas');
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xe0f2fe, 0.003); 
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 0, 180); 

        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x87CEEB);

        skyMat = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float time; varying vec2 vUv;
                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
                float noise(vec2 p) { vec2 i = floor(p); vec2 f = fract(p); vec2 u = f*f*(3.0-2.0*f); return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x), mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y); }
                float fbm(vec2 p) { float f = 0.0; float w = 0.5; for(int i=0; i<5; i++){ f += w * noise(p); p *= 2.0; w *= 0.5; } return f; }
                void main() {
                    vec2 p = vUv * 3.0; float q = fbm(p + vec2(time * 0.02, 0.0)); float r = fbm(p + q + vec2(time * 0.03, time * 0.01));
                    vec3 skyBottom = vec3(0.65, 0.85, 1.0); vec3 skyTop = vec3(0.25, 0.55, 0.95); vec3 baseSky = mix(skyBottom, skyTop, vUv.y);
                    vec3 cloudColor = vec3(1.0, 1.0, 1.0); float cloudDensity = smoothstep(0.3, 0.8, r);
                    vec3 finalColor = mix(baseSky, cloudColor, cloudDensity * 0.7);
                    gl_FragColor = vec4(finalColor * 0.65, 1.0);
                }
            `, depthWrite: false
        });
        skyPlane = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.WORLD_WIDTH * 3, CONFIG.WORLD_HEIGHT * 3), skyMat);
        skyPlane.position.z = -200; scene.add(skyPlane);

        silhouetteTex = new THREE.CanvasTexture(silhouetteCanvas);
        silhouetteTex.minFilter = THREE.LinearFilter;
        silhouetteMat = new THREE.ShaderMaterial({
            uniforms: { tMotion: { value: silhouetteTex }, time: { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tMotion; uniform float time; varying vec2 vUv;
                float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
                void main() {
                    vec2 uv = vUv; float gLine = step(0.9, rand(vec2(time * 2.0, floor(uv.y * 30.0)))); float gOffset = (rand(vec2(time, uv.y)) - 0.5) * 0.03 * gLine;
                    float shadowCenter = texture2D(tMotion, uv).r; float shadowR = texture2D(tMotion, uv + vec2(gOffset + 0.01, 0.0)).r; float shadowB = texture2D(tMotion, uv - vec2(gOffset + 0.01, 0.0)).r;
                    vec3 col = vec3(0.0); float alpha = shadowCenter;
                    if(shadowR > 0.1 && shadowCenter < 0.5) { col = vec3(1.0, 0.2, 0.4); alpha = shadowR; } 
                    else if(shadowB > 0.1 && shadowCenter < 0.5) { col = vec3(0.2, 0.8, 1.0); alpha = shadowB; }
                    gl_FragColor = vec4(col, alpha * 0.35);
                }
            `, transparent: true, depthWrite: false
        });
        silhouettePlane = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT), silhouetteMat);
        silhouettePlane.position.z = -50; scene.add(silhouettePlane);

        const skyColor = new THREE.Color(0x87CEEB);
        const baseColor = new THREE.Color(0x6b8e23);
        
        // 민들레 갯수에 맞춰 깊이값(zDepths) 동적 할당
        const zDepths = [];
        for (let i = 0; i < CONFIG.NUM_HEADS; i++) {
            zDepths.push(70 - (i * (150 / Math.max(1, CONFIG.NUM_HEADS - 1)))); 
        }
        for (let i = zDepths.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1)); [zDepths[i], zDepths[j]] = [zDepths[j], zDepths[i]];
        }

        let segmentWidth = 240 / Math.max(1, CONFIG.NUM_HEADS - 1);

        for (let i = 0; i < CONFIG.NUM_HEADS; i++) {
            let bx = -120 + (i * segmentWidth) + (Math.random() - 0.5) * 15; // 좌우 범위를 더 넓게 설정
            let bz = zDepths[i] + (Math.random() - 0.5) * 10; 
            let depthScale = 1.0 + (bz / 70); depthScale = Math.max(0.65, Math.min(depthScale, 2.2));
            
            // 원경 민들레 높이 및 배리에이션 조정: 너무 붕 뜨지 않고 바닥에 박히지도 않는 적정선 유지
            let by = -50 + (Math.random() * 10); // 기본 높이를 -50 ~ -40 범위로 좁힘
            if (bz < 0) by += bz * 0.2; // 멀어질수록 살짝만 아래로 내려가게 하여 접지감과 상호작용 영역 동시 확보
            
            let groundY = -180; let groundX = bx + (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 30); 
            let depthTint = baseColor.clone().lerp(skyColor, (60 - bz) / 180);
            const stemMat = new THREE.MeshBasicMaterial({ color: depthTint, transparent: true, opacity: 0.85 * depthScale });
            const stemMesh = new THREE.Mesh(new THREE.BufferGeometry(), stemMat);
            scene.add(stemMesh);

            const receptacleGroup = new THREE.Group();
            const cushionGeo = new THREE.SphereGeometry(2.0, 16, 12);
            const cushionMat = new THREE.MeshBasicMaterial({ color: 0xe8e8d8, transparent: true });
            const cushion = new THREE.Mesh(cushionGeo, cushionMat); cushion.scale.set(1, 0.5, 1);
            receptacleGroup.add(cushion);
            const bractGeo = new THREE.CylinderGeometry(1.8, 0.4, 2.5, 9);
            const bractMat = new THREE.MeshBasicMaterial({ color: depthTint, transparent: true }); 
            const bract = new THREE.Mesh(bractGeo, bractMat); bract.position.y = -1.2;
            receptacleGroup.add(bract);
            scene.add(receptacleGroup);

            heads.push({
                index: i, basePos: new THREE.Vector3(bx, by, bz), startPos: new THREE.Vector3(bx, groundY, bz), 
                currentPos: new THREE.Vector3(bx, groundY, bz), 
                groundPos: new THREE.Vector3(groundX, groundY, bz), velocity: new THREE.Vector3(0, 0, 0), stemMesh: stemMesh, receptacle: receptacleGroup,
                curve: new THREE.QuadraticBezierCurve3(new THREE.Vector3(groundX, groundY, bz), new THREE.Vector3((groundX+bx)/2, (groundY+by)/2, bz), new THREE.Vector3(bx, by, bz)),
                state: 'GROWING', growth: 0.0, bloomProgress: 0.0, depthScale: depthScale, originalColor: depthTint.clone(), witherProgress: 0.0, deadTimer: 0
            });
            
            for (let j = 0; j < CONFIG.SEEDS_PER_HEAD; j++) {
                const mesh = createSingleSeed();
                mesh.children.forEach((c, childIdx) => {
                    c.material = c.material.clone(); 
                    if (childIdx === 0) c.material.color.setHex(0x3d2b1f).lerp(skyColor, (60 - bz) / 180);
                    else { c.material.color.setHex(0x555555); c.material.opacity = 0.15; }
                });
                scene.add(mesh);
                const goldenRatio = (1 + Math.sqrt(5)) / 2;
                const theta = 2 * Math.PI * j / goldenRatio;
                const phi = Math.acos(1 - 2 * (j + 0.5) / CONFIG.SEEDS_PER_HEAD);
                const baseDir = new THREE.Vector3(Math.cos(theta) * Math.sin(phi), Math.cos(phi), Math.sin(theta) * Math.sin(phi));

                seedData.push({
                    mesh: mesh, headIndex: i, status: 'ATTACHED', baseDir: baseDir, radius: (2.2 + Math.random() * 0.5) * depthScale, 
                    velocity: new THREE.Vector3(), spin: (Math.random() - 0.5) * 0.1, baseScale: depthScale, zDrift: (Math.random() - 0.5) * 1.5, waveOffset: Math.random() * Math.PI * 2
                });
            }
        }

        bgPositions = new Float32Array(CONFIG.MAX_BGM_PARTICLES * 3);
        bgLife = new Float32Array(CONFIG.MAX_BGM_PARTICLES);
        bgSizes = new Float32Array(CONFIG.MAX_BGM_PARTICLES);
        bgVelocities = new Float32Array(CONFIG.MAX_BGM_PARTICLES * 3);
        for (let i = 0; i < CONFIG.MAX_BGM_PARTICLES; i++) {
            bgPositions[i * 3] = (Math.random() - 0.5) * CONFIG.WORLD_WIDTH * 1.5;
            bgPositions[i * 3 + 1] = (Math.random() - 0.5) * CONFIG.WORLD_HEIGHT * 1.5;
            bgPositions[i * 3 + 2] = -150 + Math.random() * 100; bgLife[i] = Math.random() * 10; bgSizes[i] = 15.0 + Math.random() * 25.0;
        }

        particleGeometry = new THREE.BufferGeometry();
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
        particleGeometry.setAttribute('aLife', new THREE.BufferAttribute(bgLife, 1));
        particleGeometry.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));
        particleMaterial = new THREE.ShaderMaterial({
            uniforms: THREE.UniformsUtils.merge([ THREE.UniformsLib["fog"], { time: { value: 0.0 } } ]),
            vertexShader: `
                attribute float aLife;
                attribute float aSize;
                varying float vLife;
                uniform float time;
                #include <fog_pars_vertex>
                
                void main() {
                    vLife = aLife;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = aSize * (300.0 / -mvPosition.z);
                    #include <fog_vertex>
                }
            `,
            fragmentShader: `
                varying float vLife;
                uniform float time;
                #include <fog_pars_fragment>
                
                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if(dist > 0.5) discard;
                    float core = exp(-dist * 18.0);
                    float fluff = exp(-dist * 6.0) * 0.4;
                    float twinkle = sin(vLife * 5.0 + time * 3.0) * 0.5 + 0.5;
                    vec3 finalColor = vec3(1.0, 1.0, 0.95) * (1.2 + twinkle * 0.4);
                    float alpha = (core + fluff) * min(1.0, vLife) * 0.4;
                    gl_FragColor = vec4(finalColor, alpha);
                    #include <fog_fragment>
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, fog: true
        });
        particleSystem = new THREE.Points(particleGeometry, particleMaterial); scene.add(particleSystem);

        const renderScene = new THREE.RenderPass(scene, camera);
        bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), CONFIG.BASE_BLOOM, 0.4, 0.85); 
        composer = new THREE.EffectComposer(renderer); composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(new THREE.FilmPass(0.15, 0.0, 0, false));
        window.addEventListener('resize', onWindowResize, false);
    }

    function processMotion() {
        const sw = CONFIG.SAMPLE_WIDTH, sh = CONFIG.SAMPLE_HEIGHT;
        silCtx.fillStyle = 'rgba(0,0,0,0.1)'; silCtx.fillRect(0, 0, sw, sh);
        let currentMotionX = globalMotion.x, currentMotionY = globalMotion.y; let activeMotion = false;
        if (isMockMode) {
            mockAngle += mockWindSpeed; const mx = sw/2 + Math.cos(mockAngle) * mockWindPath; const my = sh/2 + Math.sin(mockAngle * 2.1) * (mockWindPath * 0.5);
            if (showVirtualWind) {
                silCtx.beginPath(); silCtx.arc(mx, my, mockWindSize, 0, Math.PI * 2); silCtx.fillStyle = 'rgba(255,255,255,0.8)'; silCtx.fill();
            }
            currentMotionX = (mx / sw - 0.5) * CONFIG.WORLD_WIDTH; currentMotionY = -(my / sh - 0.5) * CONFIG.WORLD_HEIGHT;
            activeMotion = true; globalMotion.intensity = 0.5 * (mockWindSize / 25);
        } else {
            if (video.readyState >= 2) { ctx.save(); ctx.translate(sw, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0, sw, sh); ctx.restore(); } else return;
            const currentFrame = ctx.getImageData(0, 0, sw, sh); const currentData = currentFrame.data;
            const silhouetteFrame = silCtx.getImageData(0, 0, sw, sh); const silData = silhouetteFrame.data;
            if (!bgData) { bgData = new Float32Array(currentData.length); for(let i=0; i<currentData.length; i++) bgData[i] = currentData[i]; }
            if (previousImageData) {
                const prevData = previousImageData.data; const step = 2; let motionXSum = 0, motionYSum = 0, motionCount = 0;
                for (let y = 0; y < sh; y += step) {
                    for (let x = 0; x < sw; x += step) {
                        const i = (y * sw + x) * 4;
                        bgData[i] += (currentData[i] - bgData[i]) * 0.01; bgData[i+1] += (currentData[i+1] - bgData[i+1]) * 0.01; bgData[i+2] += (currentData[i+2] - bgData[i+2]) * 0.01;
                        const presenceDiff = Math.abs(currentData[i] - bgData[i]) + Math.abs(currentData[i+1] - bgData[i+1]) + Math.abs(currentData[i+2] - bgData[i+2]);
                        const motionDiff = Math.abs(currentData[i] - prevData[i]) + Math.abs(currentData[i+1] - prevData[i+1]) + Math.abs(currentData[i+2] - prevData[i+2]);
                        if (presenceDiff > CONFIG.MOTION_THRESHOLD * 2 || motionDiff > CONFIG.MOTION_THRESHOLD * 2) {
                            motionXSum += x; motionYSum += y; motionCount++; silData[i] = 255; silData[i+1] = 255; silData[i+2] = 255; silData[i+3] = 255;
                            if(x+1 < sw) { silData[i+4] = 255; silData[i+5] = 255; silData[i+6] = 255; silData[i+7] = 255; }
                            if(y+1 < sh) { const idx = i + sw*4; silData[idx] = 255; silData[idx+1] = 255; silData[idx+2] = 255; silData[idx+3] = 255; }
                        }
                    }
                }
                silCtx.putImageData(silhouetteFrame, 0, 0);
                if (motionCount > 40) {
                    currentMotionX = ((motionXSum / motionCount) / sw - 0.5) * CONFIG.WORLD_WIDTH; 
                    currentMotionY = -((motionYSum / motionCount) / sh - 0.5) * CONFIG.WORLD_HEIGHT;
                    globalMotion.intensity = Math.min(motionCount / 800, 1.0); activeMotion = true;
                } else { globalMotion.intensity *= 0.85; }
            }
            previousImageData = currentFrame;
        }
        if (activeMotion) {
            let dx = currentMotionX - globalMotion.x; let dy = currentMotionY - globalMotion.y;
            globalMotion.vx = globalMotion.vx * 0.7 + dx * 0.3; globalMotion.vy = globalMotion.vy * 0.7 + dy * 0.3;
            globalMotion.x = currentMotionX; globalMotion.y = currentMotionY;
        } else { globalMotion.vx *= 0.9; globalMotion.vy *= 0.9; }
        AudioEngine.updateMotion(globalMotion.intensity, Math.hypot(globalMotion.vx, globalMotion.vy));
        silhouetteTex.needsUpdate = true;
    }

    function updatePhysics() {
        const time = Date.now() * 0.001;
        let windSpeed = Math.hypot(globalMotion.vx, globalMotion.vy);
        const attachedFluffColor = new THREE.Color(0x444444); 
        const flyingFluffColor = new THREE.Color(1.5, 1.5, 1.5); // HDR 수준으로 색상을 높여 Bloom 반응성 극대화
        const skyColor = new THREE.Color(0x87CEEB);
        const baseColor = new THREE.Color(0x6b8e23);
        
        heads.forEach((head, idx) => {
            let offscreenCount = 0; let attachedCount = 0;
            for (let j = 0; j < CONFIG.SEEDS_PER_HEAD; j++) {
                let status = seedData[idx * CONFIG.SEEDS_PER_HEAD + j].status;
                if (status === 'OFFSCREEN') offscreenCount++;
                if (status === 'ATTACHED') attachedCount++;
            }
            head.attachedCount = attachedCount; 

            if (offscreenCount === CONFIG.SEEDS_PER_HEAD && head.state === 'WITHERED') {
                head.deadTimer++;
                if (head.deadTimer > 100) {
                    let segmentWidth = 240 / Math.max(1, CONFIG.NUM_HEADS - 1);
                    let bx = -120 + (idx * segmentWidth) + (Math.random() - 0.5) * 15;
                    let bz = -60 + Math.random() * 130; // -60 ~ 70 사이 재생성
                    let depthScale = 1.0 + (bz / 70); depthScale = Math.max(0.65, Math.min(depthScale, 2.2));
                    
                    // 재생성되는 민들레에도 동일한 높이 보정 적용
                    let by = -50 + (Math.random() * 10); 
                    if (bz < 0) by += bz * 0.2; 
                    
                    let groundY = -180; let groundX = bx + (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 30);
                    head.basePos.set(bx, by, bz); head.startPos.set(bx, groundY, bz); head.currentPos.copy(head.startPos);
                    head.groundPos.set(groundX, groundY, bz); head.velocity.set(0, 0, 0); head.state = 'GROWING'; head.growth = 0.0;
                    head.bloomProgress = 0.0; head.witherProgress = 0.0; head.deadTimer = 0; head.depthScale = depthScale;
                    head.originalColor = baseColor.clone().lerp(skyColor, (60 - bz) / 180);
                    head.stemMesh.material.color.copy(head.originalColor);
                    if (head.receptacle) { head.receptacle.children[0].material.color.setHex(0xe8e8d8); head.receptacle.children[1].material.color.copy(head.originalColor); }
                    for (let j = 0; j < CONFIG.SEEDS_PER_HEAD; j++) {
                        let sd = seedData[idx * CONFIG.SEEDS_PER_HEAD + j]; sd.status = 'ATTACHED'; sd.velocity.set(0, 0, 0);
                        sd.baseScale = depthScale; sd.radius = (2.2 + Math.random() * 0.5) * depthScale;
                        sd.mesh.children.forEach((c, childIdx) => {
                            if (childIdx === 0) c.material.color.setHex(0x3d2b1f).lerp(skyColor, (60 - bz) / 180);
                            else { c.material.color.copy(attachedFluffColor); c.material.opacity = 0.15 * depthScale; }
                        });
                    }
                }
            } else if (attachedCount === 0 && head.state === 'MATURE') { head.state = 'WITHERING'; }

            if (head.state === 'GROWING') {
                head.growth += 0.006; 
                
                if (head.growth < 0.5) {
                    let moveProgress = head.growth * 2.0; 
                    let easeOutMove = 1 - Math.pow(1 - moveProgress, 3);
                    head.currentPos.lerpVectors(head.startPos, head.basePos, easeOutMove);
                    head.bloomProgress = 0.0;
                } else {
                    head.currentPos.copy(head.basePos);
                    let bloomProgress = (head.growth - 0.5) * 2.0; 
                    let easeOutBloom = 1 - Math.pow(1 - bloomProgress, 3);
                    head.bloomProgress = easeOutBloom;
                }

                if (head.growth >= 1.0) { 
                    head.growth = 1.0; 
                    head.bloomProgress = 1.0; 
                    head.state = 'MATURE'; 
                }
            } else {
                let target = head.basePos.clone();
                if (head.state === 'WITHERING' || head.state === 'WITHERED') {
                    if (head.state === 'WITHERING') { head.witherProgress += 0.006; if (head.witherProgress >= 1.0) { head.witherProgress = 1.0; head.state = 'WITHERED'; } }
                    let ease = head.witherProgress * head.witherProgress; 
                    target.y = THREE.MathUtils.lerp(head.basePos.y, -200, ease); 
                    target.x = THREE.MathUtils.lerp(head.basePos.x, head.groundPos.x + 80 * (Math.sign(head.basePos.x - head.groundPos.x) || 1), ease);
                    let currentColor = head.originalColor.clone().lerp(new THREE.Color(0x8b7355), head.witherProgress);
                    head.stemMesh.material.color.copy(currentColor);
                    if (head.receptacle) { head.receptacle.children[1].material.color.copy(currentColor); head.receptacle.children[0].material.color.copy(new THREE.Color(0xe8e8d8).lerp(new THREE.Color(0xa09e8e), head.witherProgress)); }
                }
                let springForce = target.sub(head.currentPos).multiplyScalar(head.state === 'WITHERING' || head.state === 'WITHERED' ? 0.02 : 0.08);
                head.velocity.add(springForce); head.velocity.x += Math.sin(time * 1.2 + idx) * 0.05; head.velocity.z += Math.cos(time * 0.9 + idx) * 0.05;
                if (Math.hypot(head.basePos.x - globalMotion.x, head.basePos.y - globalMotion.y) < 60 && windSpeed > 0.5) { head.velocity.x += globalMotion.vx * 0.03; target.y += globalMotion.vy * 0.015; }
                head.velocity.multiplyScalar(0.82); head.currentPos.add(head.velocity);
            }

            if (head.stemMesh) {
                let dist = head.groundPos.distanceTo(head.currentPos);
                if (dist > 0.1 && head.state !== 'WITHERED') {
                    head.stemMesh.visible = true; head.curve.v0.copy(head.groundPos); head.curve.v2.copy(head.currentPos);
                    let cpX = (head.groundPos.x + head.currentPos.x) * 0.5 + (Math.sign(head.currentPos.x - head.groundPos.x) || 1) * 20 * head.depthScale;
                    let cpY = (head.groundPos.y + head.currentPos.y) * 0.5;
                    if (head.state === 'WITHERING') cpY += head.witherProgress * 60 * head.depthScale; 
                    head.curve.v1.set(cpX + head.velocity.x * 5, cpY, (head.groundPos.z + head.currentPos.z) * 0.5 + head.velocity.z * 5);
                    if (head.stemMesh.geometry) head.stemMesh.geometry.dispose();
                    head.stemMesh.geometry = new THREE.TubeGeometry(head.curve, 12, (0.5 + 0.3 * head.depthScale), 5, false);
                    
                    let opacityP = head.state === 'GROWING' ? (head.growth < 0.5 ? head.growth * 2.0 : 1.0) : head.state === 'WITHERING' ? 1 - head.witherProgress : 1;
                    head.stemMesh.material.opacity = opacityP * 0.85 * head.depthScale;
                } else head.stemMesh.visible = false;
            }

            if (head.receptacle && head.state !== 'WITHERED') {
                head.receptacle.visible = true; head.receptacle.position.copy(head.currentPos);
                let headDir = head.currentPos.clone().sub(head.curve.v1).normalize();
                head.receptacle.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), headDir);
                
                let recP = head.state === 'GROWING' ? (head.growth < 0.5 ? head.growth * 2.0 : 1.0) : 1.0;
                let recScale = recP * head.depthScale;
                head.receptacle.scale.set(recScale, recScale * 0.5, recScale);
                head.receptacle.children.forEach(child => child.material.opacity = head.stemMesh.material.opacity);
            } else if(head.receptacle) head.receptacle.visible = false;
        });

        seedData.forEach(sd => {
            let head = heads[sd.headIndex];
            let headDir = head.currentPos.clone().sub(head.curve.v1).normalize();
            let headQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), headDir);
            
            if (sd.status === 'ATTACHED') {
                const budDir = new THREE.Vector3(0, 1, 0).lerp(sd.baseDir, 0.1).normalize();
                const currentBaseDir = budDir.lerp(sd.baseDir, head.bloomProgress).normalize();
                let actualDir = currentBaseDir.clone().applyQuaternion(headQuat);
                const currentRadius = THREE.MathUtils.lerp(0.8 * sd.baseScale, sd.radius, head.bloomProgress);
                sd.mesh.position.copy(head.currentPos).add(actualDir.clone().multiplyScalar(currentRadius));
                sd.mesh.lookAt(sd.mesh.position.clone().add(actualDir)); sd.mesh.rotateX(Math.PI / 2); 
                
                let seedScaleP = head.state === 'GROWING' ? (head.growth < 0.5 ? 0.2 + 0.8 * (head.growth * 2.0) : 1.0) : 1.0;
                sd.mesh.scale.setScalar(seedScaleP * 1.2 * sd.baseScale);

                const currentFluffColor = new THREE.Color(0x333333).lerp(attachedFluffColor, head.bloomProgress);
                sd.mesh.children.forEach((c, i) => { 
                    if(i > 0) {
                        c.material.color.copy(currentFluffColor);
                        c.material.opacity = 0.15 * sd.baseScale;
                    }
                });

                if (head.state === 'MATURE') {
                    let distToMotion = Math.hypot(sd.mesh.position.x - globalMotion.x, sd.mesh.position.y - globalMotion.y);
                    let forceDetach = (head.attachedCount <= 3);
                    if ((distToMotion < 50 && windSpeed > 1.5 && Math.random() < 0.3 * globalMotion.intensity) || Math.random() < (forceDetach ? 0.03 : 0.0002)) {
                        sd.status = 'FLYING';
                        sd.mesh.children.forEach((c, i) => { 
                            if(i > 0) { 
                                c.material.color.copy(flyingFluffColor); 
                                c.material.opacity = 0.9 * sd.baseScale;
                            } 
                        });
                        let initVy = Math.max(0, globalMotion.vy * 0.2) + actualDir.y * 1.0 + 1.2; 
                        sd.velocity.set(globalMotion.vx * 0.4 + actualDir.x * 1.2, initVy, actualDir.z * 1.2 + sd.zDrift * 1.5);
                    }
                }
            } else if (sd.status === 'FLYING') {
                let distToMotion = Math.hypot(sd.mesh.position.x - globalMotion.x, sd.mesh.position.y - globalMotion.y);
                if (distToMotion < 60) {
                    let force = (1.0 - distToMotion / 60.0) * globalMotion.intensity * CONFIG.WIND_FORCE;
                    sd.velocity.x += globalMotion.vx * force * 0.06;
                    sd.velocity.y += Math.max(-0.1, globalMotion.vy * force * 0.04) + 0.02; 
                }
                
                sd.velocity.x += Math.sin(time * 1.5 + sd.waveOffset) * 0.015;
                sd.velocity.y += Math.cos(time * 1.2 + sd.waveOffset) * 0.01 + 0.015; 
                sd.velocity.z += Math.sin(time * 0.9 + sd.waveOffset) * 0.02 + sd.zDrift * 0.03;
                sd.velocity.multiplyScalar(0.96); 
                sd.mesh.position.add(sd.velocity);
                let moveDir = sd.velocity.clone().normalize(); moveDir.y += 0.8; moveDir.normalize();
                sd.mesh.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), moveDir), 0.06);
                sd.mesh.rotateY(sd.spin * 0.5); 

                let posZ = sd.mesh.position.z; let edgeFade = 1.0;
                let absX = Math.abs(sd.mesh.position.x); let posY = sd.mesh.position.y;
                if (absX > 100) edgeFade *= Math.max(0, (140 - absX) / 40); if (posY > 55) edgeFade *= Math.max(0, (95 - posY) / 40);
                let lodFade = 1.0; if (posZ < -20) { lodFade = Math.max(0, (posZ - (-100)) / 80); edgeFade *= Math.max(0, (posZ - (-180)) / 80); }
                else if (posZ > 100) edgeFade *= Math.max(0, (150 - posZ) / 50);

                sd.mesh.children.forEach((c, i) => {
                    if (i === 0) { c.material.opacity = Math.max(0.01, edgeFade); c.scale.x = THREE.MathUtils.lerp(2.5, 1.0, lodFade); c.scale.z = THREE.MathUtils.lerp(2.5, 1.0, lodFade); }
                    else { c.material.color.copy(flyingFluffColor); c.material.opacity = 0.9 * sd.baseScale * edgeFade * lodFade; } 
                });
                if (edgeFade <= 0.01 || posY > 100 || absX > 150 || posZ < -200) { sd.status = 'OFFSCREEN'; sd.mesh.scale.setScalar(0.001); }
            }
        });

        for (let i = 0; i < CONFIG.MAX_BGM_PARTICLES; i++) {
            bgVelocities[i * 3] += globalMotion.vx * 0.01 * CONFIG.WIND_FORCE;
            let bgForceY = globalMotion.vy * 0.01 * CONFIG.WIND_FORCE;
            bgVelocities[i * 3 + 1] += bgForceY < 0 ? bgForceY * 0.1 : bgForceY;
            bgVelocities[i * 3 + 1] += 0.005 + Math.sin(time * 0.5 + i) * 0.002;
            bgVelocities[i * 3] += Math.sin(time * 0.3 + bgPositions[i * 3 + 1] * 0.01) * 0.005;
            bgVelocities[i * 3] *= 0.96; bgVelocities[i * 3 + 1] *= 0.96; 
            bgPositions[i * 3] += bgVelocities[i * 3]; bgPositions[i * 3 + 1] += bgVelocities[i * 3 + 1];
            if (bgPositions[i * 3 + 1] > CONFIG.WORLD_HEIGHT || Math.abs(bgPositions[i * 3]) > CONFIG.WORLD_WIDTH * 1.5) {
                bgPositions[i * 3 + 1] = -CONFIG.WORLD_HEIGHT; bgPositions[i * 3] = (Math.random() - 0.5) * CONFIG.WORLD_WIDTH * 1.5; bgVelocities[i * 3] = 0; bgVelocities[i * 3 + 1] = 0;
            }
        }
        particleGeometry.attributes.position.needsUpdate = true;
    }

    function onWindowResize() {
        if (!camera || !renderer || !composer) return;
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(skyMat) skyMat.uniforms.time.value += 0.016;
        if(silhouetteMat) silhouetteMat.uniforms.time.value += 0.016;
        if(particleMaterial) particleMaterial.uniforms.time.value += 0.016; 
        processMotion(); updatePhysics();
        camera.position.x = Math.sin(Date.now() * 0.0005) * 10; camera.position.y = Math.cos(Date.now() * 0.0004) * 8;
        camera.lookAt(0, -10, 0); composer.render();
    }
</script>
